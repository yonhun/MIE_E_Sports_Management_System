<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register - Tournament System</title>
    {# 외부 CSS 파일 링크만 남깁니다. #}
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
<div class="auth-container">
    <h2>Register</h2>

    {# Flash Message 처리 영역에 class="flash-messages"를 적용합니다. #}
    <div class="flash-messages">
        {% with messages = get_flashed_messages() %}
            {% if messages %}
                <ul>
                    {% for msg in messages %}
                        <li>{{ msg }}</li>
                    {% endfor %}
                </ul>
            {% endif %}
        {% endwith %}
    </div>

    <form action="{{ url_for('register') }}" method="post">
        <div>
            <label>Username:
                <input type="text" name="username">
            </label>
        </div>
        <div>
            <label>Password:
                <input type="password" name="password">
            </label>
        </div>
        
        <div>
            <label>Initial Role:
                <select name="initial_role">
                    <option value="USER" selected>User (Participant)</option>
                    <option value="ADMIN">Admin (Site Manager)</option>
                </select>
            </label>
        </div>
        <div>
            <button type="submit">Register</button>
        </div>
    </form>

    <hr>
    <a href="{{ url_for('login_page') }}">Back to Login</a>
</div>
</body>
</html>
