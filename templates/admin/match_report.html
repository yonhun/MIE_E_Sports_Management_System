{% extends "base.html" %}
{% block content %}
<h2>Report Result (Admin Mode)</h2>

<p>{{ match.stage }} Round {{ match.round_no }} - {{ match.team1.name }} vs {{ match.team2.name }}</p>

<form action="{{ url_for('admin_match_report', match_id=match.id) }}" method="post">
    <label>{{ match.team1.name }} score:
        <input type="number" name="team1_score" value="{{ match.team1_score or 0 }}">
    </label>
    <br>
    <label>{{ match.team2.name }} score:
        <input type="number" name="team2_score" value="{{ match.team2_score or 0 }}">
    </label>
    <br>
    <button type="submit">Submit</button>
</form>
{% endblock %}
