{% extends "base.html" %}
{% block content %}
<h2>📝 결과 입력</h2>

<p>{{ match.stage }} 라운드 {{ match.round_no }} - {{ match.team1.name }} vs {{ match.team2.name }}</p>

<form action="{{ url_for('admin_match_report', match_id=match.id) }}" method="post">
    <label>{{ match.team1.name }} 점수:
        <input type="number" name="team1_score" value="{{ match.team1_score or 0 }}">
    </label>
    <br>
    <label>{{ match.team2.name }} 점수:
        <input type="number" name="team2_score" value="{{ match.team2_score or 0 }}">
    </label>
    <br>
    <button type="submit">수정</button>
</form>
{% endblock %}
