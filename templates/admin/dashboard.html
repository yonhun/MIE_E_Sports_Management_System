{% extends "base.html" %}
{% block content %}
<h2>Dashboard</h2>

{% if tournament %}
    <p>Current tournament: {{ tournament.name }} (status: {{ tournament.status }})</p>
    <p>Total applications: {{ total_applications }}</p>
    <p>Approved: {{ approved }}</p>
{% else %}
    <p>No tournament available.</p>
{% endif %}
{% endblock %}
